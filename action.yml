name: "opencode GitHub Action - Pinned version forks"
description: "Run opencode in GitHub Actions workflows with pinned, verified releases"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the opencode session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of OpenCode App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/opencode,/oc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.opencode.ai"
    required: false

  MOCK_TEST:
    description: "If true, skip github run mode and execute opencode run with PROMPT directly."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Resolve opencode release metadata
      id: meta
      shell: bash
      env:
        # renovate: datasource=github-releases depName=anomalyco/opencode
        OPENCODE_VERSION: "v1.17.5"
        GH_TOKEN: ${{ github.token }}
      run: |
        bash "$GITHUB_ACTION_PATH/scripts/opencode-release.sh" metadata >> "$GITHUB_OUTPUT"

    - name: Cache opencode archive
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.meta.outputs.cache_dir }}
        key: opencode-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.asset_digest_hex }}

    - name: Install opencode
      shell: bash
      run: |
        bash "$GITHUB_ACTION_PATH/scripts/opencode-release.sh" install
      env:
        OPENCODE_VERSION: ${{ steps.meta.outputs.version }}
        OPENCODE_FILENAME: ${{ steps.meta.outputs.filename }}
        OPENCODE_DIGEST_HEX: ${{ steps.meta.outputs.asset_digest_hex }}
        OPENCODE_CACHE_DIR: ${{ steps.meta.outputs.cache_dir }}
        OPENCODE_INSTALL_DIR: ${{ steps.meta.outputs.install_dir }}

    - name: Run opencode
      if: ${{ inputs.MOCK_TEST != 'true' }}
      shell: bash
      id: run_opencode
      run: opencode github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}

    - name: Run mock opencode
      if: ${{ inputs.MOCK_TEST == 'true' }}
      shell: bash
      env:
        PROMPT: ${{ inputs.prompt }}
      run: |
        echo "Running mock mode......(Only used to sure OpenCode exists and working)"
        echo "OpenCode Version:"
        opencode --version
        echo ""
        echo "Running OpenCode:"
        opencode run "${PROMPT:-Is your gh cli logged in?}"
